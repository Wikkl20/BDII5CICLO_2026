<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Portfolio</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗄️</text></svg>">
</head>
<body class="dark">
  <div class="bg-noise"></div>
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-circle" id="cursor-circle"></div>
  <div class="blob blob-1"></div>
  
  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-content">
      <!-- Logo -->
      <div class="text-center mb-6">
        <a href="index.html" class="navbar-brand" style="justify-content: center; display: inline-flex;">
          <div class="navbar-logo">DB</div>
        </a>
      </div>

      <!-- Register Form -->
      <div class="form-card">
        <div class="form-header">
          <h1 class="form-title">Crear Cuenta</h1>
          <p class="form-subtitle">Regístrate para acceder al portafolio</p>
          <div style="margin-top:.75rem;padding:.6rem .9rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:.5rem;font-size:.75rem;color:rgba(255,255,255,0.5);line-height:1.5;">
            Luego de registrarte, el <strong style="color:rgba(212,175,55,0.8)">administrador</strong> aprobará tu acceso.
          </div>
        </div>

        <form id="register-form">
          <div class="form-group">
            <label class="form-label" for="nombre">Nombre completo</label>
            <input type="text" id="nombre" class="form-input" placeholder="Tu nombre" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="tu@email.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres" minlength="6" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirmar contraseña</label>
            <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required>
          </div>

          <div id="register-error" class="alert alert-error hidden"></div>
          <div id="register-success" class="alert alert-success hidden"></div>

          <button type="submit" class="btn btn-primary btn-full" id="register-btn">
            <span>Registrarse</span>
            <div class="spinner hidden"></div>
          </button>
        </form>

        <div class="form-footer">
          <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </div>
      </div>

      <!-- Back to Home -->
      <div class="text-center mt-4">
        <a href="index.html" class="btn btn-ghost">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script>
    // Inicializar Supabase
    if (window.initSupabase) window.initSupabase();
    
    // Custom cursor
    const cursorDot = document.getElementById('cursor-dot');
    const cursorCircle = document.getElementById('cursor-circle');
    document.addEventListener('mousemove', (e) => {
      cursorDot.style.left = e.clientX + 'px';
      cursorDot.style.top = e.clientY + 'px';
      cursorCircle.style.left = e.clientX + 'px';
      cursorCircle.style.top = e.clientY + 'px';
    });

    // Register handler
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn = document.getElementById('register-btn');
      const errorDiv = document.getElementById('register-error');
      const successDiv = document.getElementById('register-success');
      
      if (password !== confirmPassword) {
        errorDiv.textContent = 'Las contraseñas no coinciden';
        errorDiv.classList.remove('hidden');
        successDiv.classList.add('hidden');
        return;
      }

      btn.classList.add('btn-loading');
      btn.querySelector('span').classList.add('hidden');
      btn.querySelector('.spinner').classList.remove('hidden');
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      try {
        // Esperar a que Supabase esté listo
        let attempts = 0;
        const supabase = await new Promise((resolve) => {
          const check = () => {
            if (window.SB || window.supabase) {
              resolve(window.SB || window.supabase);
            } else if (attempts < 10) {
              attempts++;
              setTimeout(check, 200);
            } else {
              resolve(null);
            }
          };
          check();
        });
        
        if (!supabase) {
          throw new Error('Error al conectar con Supabase. Recarga la página.');
        }

        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              nombre_completo: nombre
            }
          }
        });

        if (error) throw error;

        successDiv.innerHTML = '✅ <strong>¡Registro exitoso!</strong><br>Tu solicitud fue enviada. El administrador revisará tu cuenta y te dará acceso. Puedes iniciar sesión una vez aprobado.';
        successDiv.classList.remove('hidden');
        document.getElementById('register-form').reset();
        
        // Si Supabase confirmación automática está activa, redirigir
        if (data?.session) {
          setTimeout(() => { window.location.href = 'unidad.html?u=1'; }, 2000);
        }
      } catch (err) {
        errorDiv.textContent = err.message || 'Error al registrarse';
        errorDiv.classList.remove('hidden');
        successDiv.classList.add('hidden');
      } finally {
        btn.classList.remove('btn-loading');
        btn.querySelector('span').classList.remove('hidden');
        btn.querySelector('.spinner').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
