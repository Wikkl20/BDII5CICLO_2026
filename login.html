<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Portfolio</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗄️</text></svg>">
</head>
<body class="dark">
  <div class="bg-noise"></div>
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-circle" id="cursor-circle"></div>
  <div class="blob blob-1"></div>
  
  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-content">
      <!-- Logo -->
      <div class="text-center mb-6">
        <a href="index.html" class="navbar-brand" style="justify-content: center; display: inline-flex;">
          <div class="navbar-logo">DB</div>
        </a>
      </div>

      <!-- Login Form -->
      <div class="form-card">
        <div class="form-header">
          <h1 class="form-title">Bienvenido</h1>
          <p class="form-subtitle">Ingresa tus credenciales para acceder</p>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="tu@email.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
          </div>

          <div id="login-error" class="alert alert-error hidden"></div>

          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            <span>Iniciar Sesión</span>
            <div class="spinner hidden"></div>
          </button>
        </form>

        <div class="form-footer">
          <p>¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
        </div>
      </div>

      <!-- Back to Home -->
      <div class="text-center mt-4">
        <a href="index.html" class="btn btn-ghost">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script>
    // Inicializar Supabase
    if (window.initSupabase) window.initSupabase();
    
    // Custom cursor
    const cursorDot = document.getElementById('cursor-dot');
    const cursorCircle = document.getElementById('cursor-circle');
    document.addEventListener('mousemove', (e) => {
      cursorDot.style.left = e.clientX + 'px';
      cursorDot.style.top = e.clientY + 'px';
      cursorCircle.style.left = e.clientX + 'px';
      cursorCircle.style.top = e.clientY + 'px';
    });

    // Login handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errorDiv = document.getElementById('login-error');
      
      btn.classList.add('btn-loading');
      btn.querySelector('span').classList.add('hidden');
      btn.querySelector('.spinner').classList.remove('hidden');
      errorDiv.classList.add('hidden');

      // Esperar a que Supabase esté listo
      let attempts = 0;
      const waitForSupabase = () => {
        return new Promise((resolve) => {
          const check = () => {
            if (window.SB || window.supabase) {
              resolve(window.SB || window.supabase);
            } else if (attempts < 10) {
              attempts++;
              setTimeout(check, 200);
            } else {
              resolve(null);
            }
          };
          check();
        });
      };

      try {
        const supabase = await waitForSupabase();
        
        if (!supabase) {
          throw new Error('Error al conectar con Supabase. Recarga la página.');
        }

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        window.location.href = 'dashboard.html';
      } catch (err) {
        errorDiv.textContent = err.message || 'Error al iniciar sesión';
        errorDiv.classList.remove('hidden');
      } finally {
        btn.classList.remove('btn-loading');
        btn.querySelector('span').classList.remove('hidden');
        btn.querySelector('.spinner').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
